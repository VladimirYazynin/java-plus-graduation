server.port: 0

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: aggregator-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.practicum.stats.serialization.avroschemas.deserializer.UserActionDeserializer
      topic:
        user-actions: stats.user-actions.v1
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.stats.serialization.avroschemas.AvroSerializer
      topic:
        events-similarity: stats.events-similarity.v1

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  output:
    ansi:
      enabled: always

coefficients:
  weights:
    view: 0.4
    register: 0.8
    like: 1.0

logging:
  level:
    org.springframework.cloud.loadbalancer: WARN
    com.netflix.discovery: WARN
    aggregator: DEBUG
